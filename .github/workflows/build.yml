name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx vite build
      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx vite build
      - name: Build Mac DMG
        run: npx electron-builder --mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: artifacts
      - name: List artifacts
        run: ls -la artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: Text2QR Desktop ${{ github.ref_name }}
          body: |
            Text2QR Desktop ${{ github.ref_name }} for Windows and macOS.
            All operations work 100% offline. Compatible with text2qr.app.
